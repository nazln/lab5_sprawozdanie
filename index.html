<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab5 - Info serwera</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 48px 64px;
            text-align: center;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
            min-width: 420px;
        }
        h1 {
            font-size: 1.6em;
            color: #58a6ff;
            margin-bottom: 36px;
            letter-spacing: 1px;
        }
        .row {
            margin: 20px 0;
            padding: 16px 24px;
            background: #0d1117;
            border-radius: 10px;
            border: 1px solid #21262d;
        }
        .label {
            font-size: 0.75em;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
        }
        .value {
            font-size: 1.25em;
            font-weight: 600;
            color: #e6edf3;
            word-break: break-all;
        }
        .badge {
            display: inline-block;
            margin-top: 28px;
            background: #1f6feb;
            color: #fff;
            border-radius: 20px;
            padding: 6px 20px;
            font-size: 0.9em;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🖥️ Informacje o serwerze</h1>

        <div class="row">
            <div class="label">Adres IP serwera</div>
            <div class="value">SERVER_IP</div>
        </div>

        <div class="row">
            <div class="label">Nazwa serwera (hostname)</div>
            <div class="value">SERVER_HOSTNAME</div>
        </div>

        <div class="badge">Wersja: APP_VERSION</div>
    </div>
</body>
</html>
